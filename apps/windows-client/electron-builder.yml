appId: com.whiteboard.windows
productName: Whiteboard Engine
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - nsis
    - portable
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
